    <rect x="85" y="60" width="12" height="8" fill="#374151" rx="2"/>
    <circle cx="91" cy="64" r="4" fill="#E5E7EB"/>
    <circle cx="91" cy="64" r="2" fill="#06B6D4"/>
    <line x1="91" y1="55" x2="91" y2="60" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <g>
    <!-- Sensor 3 -->
    <rect x="145" y="75" width="12" height="8" fill="#374151" rx="2"/>
