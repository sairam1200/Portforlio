<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orchardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="treeGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#166534;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14532D;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#orchardBg)"/>

  <!-- Ground -->
  <rect x="0" y="160" width="200" height="40" fill="#8B4513"/>
  <rect x="0" y="165" width="200" height="35" fill="#A0522D"/>

  <!-- Trees -->
  <g>
    <!-- Tree 1 -->
    <rect x="35" y="130" width="8" height="30" fill="#654321"/>
