    <circle cx="115" cy="112" r="2" fill="#DC2626"/>
    <circle cx="123" cy="114" r="2" fill="#EA580C"/>
  </g>

  <!-- Sensors/Cameras -->
  <g>
    <!-- Sensor 1 -->
    <rect x="25" y="70" width="12" height="8" fill="#374151" rx="2"/>
    <circle cx="31" cy="74" r="4" fill="#E5E7EB"/>
    <circle cx="31" cy="74" r="2" fill="#06B6D4"/>
    <line x1="31" y1="65" x2="31" y2="70" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <g>
