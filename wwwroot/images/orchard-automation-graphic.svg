    <circle cx="68" cy="105" r="14" fill="#15803D"/>
    <circle cx="90" cy="105" r="14" fill="#15803D"/>
    <circle cx="79" cy="95" r="12" fill="#166534"/>
    <!-- Fruits -->
    <circle cx="73" cy="100" r="2" fill="#EA580C"/>
    <circle cx="85" cy="102" r="2" fill="#DC2626"/>
    <circle cx="79" cy="110" r="2" fill="#EA580C"/>
    <circle cx="75" cy="115" r="2" fill="#DC2626"/>
  </g>

  <g>
    <!-- Tree 3 -->
    <rect x="115" y="135" width="8" height="25" fill="#654321"/>
    <circle cx="119" cy="120" r="16" fill="url(#treeGradient)"/>
    <circle cx="110" cy="115" r="10" fill="#15803D"/>
    <circle cx="128" cy="115" r="10" fill="#15803D"/>
    <circle cx="119" cy="108" r="8" fill="#166534"/>
