    <circle cx="43" cy="108" r="2" fill="#EA580C"/>
    <circle cx="39" cy="115" r="2" fill="#DC2626"/>
  </g>

  <g>
    <!-- Tree 2 -->
    <rect x="75" y="125" width="8" height="35" fill="#654321"/>
