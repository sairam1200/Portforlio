<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="visionBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="lensGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E5E7EB;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#visionBg)"/>

  <!-- Camera body -->
  <rect x="60" y="70" width="80" height="60" fill="#374151" rx="8" stroke="#1F2937" stroke-width="2"/>
  <rect x="75" y="85" width="50" height="30" fill="#1F2937" rx="4"/>
  <circle cx="100" cy="100" r="18" fill="url(#lensGradient)" stroke="#374151" stroke-width="3"/>
  <circle cx="100" cy="100" r="12" fill="#06B6D4"/>
  <circle cx="100" cy="100" r="6" fill="#FFFFFF"/>

  <!-- Lens flare -->
  <line x1="100" y1="45" x2="100" y2="55" stroke="#FFFFFF" stroke-width="3" opacity="0.8"/>
  <line x1="145" y1="100" x2="155" y2="100" stroke="#FFFFFF" stroke-width="3" opacity="0.8"/>
  <line x1="100" y1="145" x2="100" y2="155" stroke="#FFFFFF" stroke-width="3" opacity="0.8"/>
  <line x1="45" y1="100" x2="55" y2="100" stroke="#FFFFFF" stroke-width="3" opacity="0.8"/>

  <!-- Image processing grid -->
  <g opacity="0.7">
