    <rect x="54" y="30" width="10" height="10" fill="#EF4444"/>
    <rect x="30" y="42" width="10" height="10" fill="#8B5CF6"/>
    <rect x="42" y="42" width="10" height="10" fill="#06B6D4"/>
    <rect x="54" y="42" width="10" height="10" fill="#10B981"/>
    <rect x="30" y="54" width="10" height="10" fill="#F59E0B"/>
    <rect x="42" y="54" width="10" height="10" fill="#EF4444"/>
    <rect x="54" y="54" width="10" height="10" fill="#8B5CF6"/>
  </g>

  <!-- Processing arrows -->
  <path d="M75 35 L85 25 L85 35 L95 35 L95 45 L85 45 L85 55 L75 45 Z" fill="#FFFFFF" opacity="0.9"/>
  <path d="M125 165 L135 155 L135 165 L145 165 L145 175 L135 175 L135 185 L125 175 Z" fill="#FFFFFF" opacity="0.9"/>

