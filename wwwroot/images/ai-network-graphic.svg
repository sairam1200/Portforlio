<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="nodeGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F3F4F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E5E7EB;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#aiGradient)"/>

  <!-- Neural network layers -->
  <!-- Input layer -->
  <circle cx="50" cy="60" r="8" fill="url(#nodeGradient)" stroke="#6366F1" stroke-width="2"/>
  <circle cx="50" cy="90" r="8" fill="url(#nodeGradient)" stroke="#6366F1" stroke-width="2"/>
  <circle cx="50" cy="120" r="8" fill="url(#nodeGradient)" stroke="#6366F1" stroke-width="2"/>
  <circle cx="50" cy="150" r="8" fill="url(#nodeGradient)" stroke="#6366F1" stroke-width="2"/>

  <!-- Hidden layer 1 -->
  <circle cx="100" cy="50" r="8" fill="url(#nodeGradient)" stroke="#6366F1" stroke-width="2"/>
  <circle cx="100" cy="80" r="8" fill="url(#nodeGradient)" stroke="#6366F1" stroke-width="2"/>
  <circle cx="100" cy="110" r="8" fill="url(#nodeGradient)" stroke="#6366F1" stroke-width="2"/>
  <circle cx="100" cy="140" r="8" fill="url(#nodeGradient)" stroke="#6366F1" stroke-width="2"/>
  <circle cx="100" cy="170" r="8" fill="url(#nodeGradient)" stroke="#6366F1" stroke-width="2"/>

  <!-- Hidden layer 2 -->
  <circle cx="150" cy="70" r="8" fill="url(#nodeGradient)" stroke="#6366F1" stroke-width="2"/>
  <circle cx="150" cy="100" r="8" fill="url(#nodeGradient)" stroke="#6366F1" stroke-width="2"/>
  <circle cx="150" cy="130" r="8" fill="url(#nodeGradient)" stroke="#6366F1" stroke-width="2"/>

  <!-- Output layer -->
  <circle cx="185" cy="100" r="10" fill="#10B981" stroke="#059669" stroke-width="2"/>
  <text x="185" y="105" text-anchor="middle" fill="white" font-size="12" font-weight="bold">✓</text>

  <!-- Connection lines -->
  <g stroke="#A78BFA" stroke-width="1" opacity="0.6">
    <!-- Input to hidden 1 -->
    <line x1="58" y1="60" x2="92" y2="50"/>
    <line x1="58" y1="90" x2="92" y2="80"/>
    <line x1="58" y1="120" x2="92" y2="110"/>
    <line x1="58" y1="150" x2="92" y2="140"/>
    <line x1="58" y1="90" x2="92" y2="170"/>
    <line x1="58" y1="120" x2="92" y2="50"/>

    <!-- Hidden 1 to hidden 2 -->
    <line x1="108" y1="50" x2="142" y2="70"/>
    <line x1="108" y1="80" x2="142" y2="100"/>
    <line x1="108" y1="110" x2="142" y2="130"/>
    <line x1="108" y1="140" x2="142" y2="70"/>
    <line x1="108" y1="170" x2="142" y2="100"/>

    <!-- Hidden 2 to output -->
    <line x1="158" y1="70" x2="175" y2="100"/>
    <line x1="158" y1="100" x2="175" y2="100"/>
    <line x1="158" y1="130" x2="175" y2="100"/>
  </g>

  <!-- Data flow particles -->
  <circle cx="75" cy="75" r="2" fill="#F59E0B"/>
  <circle cx="125" cy="90" r="2" fill="#F59E0B"/>
  <circle cx="165" cy="105" r="2" fill="#10B981"/>
</svg></content>
